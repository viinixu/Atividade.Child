<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
    <style>
        .quadrado{
            width: 50px;
            height: 50px;
            background-color: rgb(87, 205, 189);
            margin: 5px;
            display: inline-block;
        }
    </style>
</head>
<body>

    <button id="btnAdicionar">Adicionar Quadrado</button>
    <button id="btnRemover">Remover Quadrado</button>

    <div id="containerQuadra"></div>

    <script>
        const botao = document.getElementById('btnAdicionar');
        const botaoR = document.getElementById('btnRemover');
        const container = document.getElementById('containerQuadra');

        botao.addEventListener('click', function() {
            
            const novoQuadrado = document.createElement('div');
            
            novoQuadrado.classList.add('quadrado');
            
            container.appendChild(novoQuadrado);
        });
        
         botaoR.addEventListener('click', function () {

            if (container.lastElementChild) {
                container.removeChild(container.lastElementChild);
            }
        });

    </script>

</body>
</html>
